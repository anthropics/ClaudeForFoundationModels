name: pr-title

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    # release-please only recognizes Conventional Commits. Squash merges take
    # their message from the PR title (repo squash setting: "Pull request
    # title"), so linting the title here keeps main's history parseable.
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
